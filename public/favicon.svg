<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Brutalist: sharp corners, no gradients, offset shadow -->
  <rect width="512" height="512" fill="#0A0A0A"/>
  <!-- Green brutal offset shadow -->
  <rect x="8" y="8" width="504" height="504" fill="none" stroke="#00DC82" stroke-width="4"/>
  <!-- Inner border -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Bold A — AgentZ mark -->
  <g transform="translate(100, 80)">
    <!-- The A shape — geometric, brutalist -->
    <path d="M 156 0 L 312 352 L 248 352 L 212 264 L 100 264 L 64 352 L 0 352 Z M 156 56 L 120 224 L 192 224 Z" fill="#FAFAFA"/>
    <!-- Green underscore — brutal accent -->
    <rect x="40" y="370" width="232" height="12" fill="#00DC82"/>
  </g>
</svg>
